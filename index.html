<!DOCTYPE html>
<html dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل حضور الخدام - كاميرا خارجية</title>
  <script src="https://cdn.jsdelivr.net/npm/html5-qrcode/minified/html5-qrcode.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Cairo', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; text-align: center; }
    .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    .header { background: linear-gradient(135deg, #1a237e, #283593); color: white; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
    .header h2 { margin: 0; font-size: 20px; }
    select { padding: 10px; border-radius: 8px; border: 1px solid #ccc; font-family: 'Cairo'; width: 100%; margin-bottom: 10px; box-sizing: border-box; }
    #reader { width: 100%; max-width: 400px; margin: 0 auto; border-radius: 10px; overflow: hidden; }
    #result { margin-top: 20px; padding: 15px; border-radius: 8px; display: none; font-weight: bold; }
    .success { background: #d4edda; color: #155724; }
    .error { background: #f8d7da; color: #721c24; }
    .info { background: #d1ecf1; color: #0c5460; }
    .btn { padding: 12px 30px; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; font-family: 'Cairo'; margin: 5px; width: 100%; box-sizing: border-box; }
    .btn-blue { background: #1a237e; color: white; font-weight: bold; }
    .btn-green { background: #2e7d32; color: white; font-weight: bold; }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <h2>📷 تسجيل حضور الخدام</h2>
    <small>امسح QR Code الخاص بالخادم لتسجيل حضوره</small>
  </div>
  
  <div style="background: #f8f9fa; padding: 15px; border-radius: 10px; margin-bottom: 15px;">
    <select id="courseSelect" onchange="updateSessions()">
      <option value="">-- جاري تحميل الكورسات... --</option>
    </select>
    <select id="sessionSelect">
      <option value="">-- اختر المحاضرة --</option>
    </select>
    <button onclick="setCourseAndSession()" class="btn btn-blue">تأكيد واختيار الكورس</button>
  </div>
  
  <div id="reader"></div>
  <div id="result"></div>
  
  <div id="scanAgain" style="display:none; margin-top:10px;">
    <button onclick="restartScanner()" class="btn btn-green">🔄 مسح خادم آخر</button>
  </div>
</div>

<script>
  // 🔥 تأكد تماماً من وضع رابط الـ Web App الأحدث (الذي حصلت عليه بعد آخر New Deployment) هنا:
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyWrVwQRPtrQmcsGgz_IH8_eDeE-e_8hd0Ea3up4i9DCw4_lUfGS-8TSr0nHubI8lYJuw/exec";

  var html5QrCode;
  var isScanning = false;
  var selectedCourse = "";
  var selectedSession = "";
  var selectedTerm = "";
  
  // تحميل الكورسات النشطة (تستبعد المنتهية تلقائياً بناءً على تاريخ اليوم في 2026)
  window.onload = function() {
    fetch(SCRIPT_URL + "?api=getCourses")
      .then(res => res.json())
      .then(courses => {
        var select = document.getElementById('courseSelect');
        if (!courses || courses.length === 0) {
          select.innerHTML = '<option value="">-- لا توجد كورسات نشطة حالياً --</option>';
          return;
        }
        
        select.innerHTML = '<option value="">-- اختر الكورس --</option>';
        courses.forEach(function(c) {
          var opt = document.createElement('option');
          opt.value = JSON.stringify({ course: c.course, term: c.term, max: c.sessionsCount });
          opt.text = c.course + " (تيرم " + c.term + ")";
          select.appendChild(opt);
        });
      })
      .catch(err => {
        console.error("Error fetching courses:", err);
        var select = document.getElementById('courseSelect');
        select.innerHTML = '<option value="">⚠️ تعذر جلب الكورسات، شيك على الرابط</option>';
      });
  };

  // تحديث أرقام المحاضرات بناءً على الكورس المختار
  function updateSessions() {
    var courseData = document.getElementById('courseSelect').value;
    var sessionSelect = document.getElementById('sessionSelect');
    sessionSelect.innerHTML = '<option value="">-- اختر المحاضرة --</option>';
    
    if (!courseData) return;
    
    var parsed = JSON.parse(courseData);
    var max = parseInt(parsed.max) || 12;
    for (var i = 1; i <= max; i++) {
      sessionSelect.innerHTML += `<option value="${i}">المحاضرة ${i}</option>`;
    }
  }

  // تأكيد تثبيت البيانات لبدء تشغيل الكاميرا
  function setCourseAndSession() {
    var courseData = document.getElementById('courseSelect').value;
    var session = document.getElementById('sessionSelect').value;
    
    if (!courseData || !session) {
        showResult("⚠️ من فضلك اختر الكورس والمحاضرة", "error");
        return;
    }
    
    var parsed = JSON.parse(courseData);
    selectedCourse = parsed.course;
    selectedTerm = parsed.term;
    selectedSession = session;
    
    showResult("✅ تم التحديد. الكاميرا جاهزة للعمل.", "success");
    if (!isScanning) startScanner();
  }

  // تشغيل الكاميرا
  function startScanner() {
    if (isScanning) return;
    document.getElementById('reader').innerHTML = '';
    html5QrCode = new Html5Qrcode("reader");
    
    html5QrCode.start(
      { facingMode: "environment" },
      { fps: 10, qrbox: { width: 250, height: 250 }, aspectRatio: 1.0 },
      onScanSuccess,
      function(error) { /* تجاهل أخطاء الحركة العادية */ }
    ).then(function() {
      isScanning = true;
    }).catch(function(err) {
      showResult("❌ تعذر فتح الكاميرا، يرجى إعطاء الصلاحية للمتصفح.", "error");
    });
  }

  // معالجة قراءة الـ QR بنجاح وإرسال البيانات للسيرفر
  function onScanSuccess(decodedText, decodedResult) {
    if (!isScanning) return;
    if (!selectedCourse || !selectedSession) {
      showResult("⚠️ من فضلك حدد الكورس أولاً", "error");
      return;
    }
    
    stopScanner();
    showResult("⏳ جاري تسجيل الحضور وفحص وقت التأخير...", "info");
    
    var url = `${SCRIPT_URL}?api=scanQR&decodedText=${encodeURIComponent(decodedText)}&course=${encodeURIComponent(selectedCourse)}&session=${encodeURIComponent(selectedSession)}&term=${encodeURIComponent(selectedTerm)}`;
    
    fetch(url)
      .then(res => res.json())
      .then(response => {
        if (response.success) {
          showResult(response.message, "success");
        } else {
          showResult(response.message, "error");
        }
        document.getElementById('scanAgain').style.display = 'block';
      })
      .catch(err => {
        showResult("❌ خطأ في الاتصال بقاعدة البيانات", "error");
        document.getElementById('scanAgain').style.display = 'block';
      });
  }

  // إيقاف الكاميرا بشكل آمن
  function stopScanner() {
    if (html5QrCode && isScanning) {
      html5QrCode.stop().then(() => isScanning = false).catch(err => console.log(err));
    }
  }

  // إعادة مسح كود آخر
  function restartScanner() {
    document.getElementById('result').style.display = 'none';
    document.getElementById('scanAgain').style.display = 'none';
    startScanner();
  }

  // طباعة النتيجة على الشاشة
  function showResult(message, type) {
    var resultDiv = document.getElementById('result');
    resultDiv.innerHTML = message;
    resultDiv.className = type;
    resultDiv.style.display = 'block';
  }
</script>
</body>
</html>
