<!DOCTYPE html>
<html dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل حضور الخدام</title>
  <script src="https://cdn.jsdelivr.net/npm/html5-qrcode/minified/html5-qrcode.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Cairo', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; text-align: center; }
    .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    .header { background: linear-gradient(135deg, #1a237e, #283593); color: white; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
    select { padding: 10px; border-radius: 8px; border: 1px solid #ccc; width: 100%; margin-bottom: 10px; box-sizing: border-box; font-family: 'Cairo'; }
    #reader { width: 100%; max-width: 400px; margin: 0 auto; border-radius: 10px; overflow: hidden; }
    #result { margin-top: 20px; padding: 15px; border-radius: 8px; display: none; font-weight: bold; }
    .success { background: #d4edda; color: #155724; display: block; }
    .error { background: #f8d7da; color: #721c24; display: block; }
    .info { background: #d1ecf1; color: #0c5460; display: block; }
    .btn { padding: 12px 30px; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; margin: 5px; width: 100%; box-sizing: border-box; font-family: 'Cairo'; }
    .btn-blue { background: #1a237e; color: white; font-weight: bold; }
    .btn-green { background: #2e7d32; color: white; font-weight: bold; }
    .btn-red { background: #c62828; color: white; font-weight: bold; }
    .loading { color: #666; font-size: 14px; }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <h2>📷 تسجيل حضور الخدام</h2>
    <small style="opacity:0.8;">امسح QR Code الخاص بالخادم لتسجيل حضوره</small>
  </div>
  
  <div style="background: #f8f9fa; padding: 15px; border-radius: 10px; margin-bottom: 15px;">
    <select id="courseSelect" onchange="updateSessions()">
      <option value="">-- جاري تحميل الكورسات... --</option>
    </select>
    <select id="sessionSelect">
      <option value="">-- اختر المحاضرة --</option>
    </select>
    <button onclick="setCourseAndSession()" class="btn btn-blue">✅ تأكيد الكورس والمحاضرة</button>
  </div>
  
  <div id="reader"></div>
  <div id="result" style="display:none;"></div>
  
  <button onclick="restartScanner()" class="btn btn-green" style="display:none;" id="scanAgainBtn">🔄 مسح مرة أخرى</button>
  <button onclick="window.location.href='https://script.google.com/macros/s/AKfycbyWrVwQRPtrQmcsGgz_IH8_eDeE-e_8hd0Ea3up4i9DCw4_lUfGS-8TSr0nHubI8lYJuw/exec?page=form'" class="btn btn-red">🏠 العودة للرئيسية</button>
</div>

<script>
  // الرابط الخاص بك مدمج وجاهز تماماً
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyWrVwQRPtrQmcsGgz_IH8_eDeE-e_8hd0Ea3up4i9DCw4_lUfGS-8TSr0nHubI8lYJuw/exec";

  var html5QrCode;
  var isScanning = false;
  var selectedCourse = "";
  var selectedSession = "";
  var selectedTerm = "";
  var coursesList = [];

  window.onload = function() {
    loadCourses();
  };

  // 1. جلب الكورسات باستخدام حقن السكريبت الآمن (JSONP) لكسر حظر CORS
  function loadCourses() {
    showResult("⏳ جاري تحميل الكورسات...", "info");
    
    var script = document.createElement('script');
    script.src = SCRIPT_URL + "?api=getCourses&callback=handleCoursesResponse";
    document.body.appendChild(script);
  }

  // الدالة المستقبلة لبيانات الكورسات ومعالجتها
  function handleCoursesResponse(data) {
    console.log("البيانات المستلمة الكورسات:", data);
    
    if (data.error) {
      showResult("❌ " + data.error, "error");
      return;
    }
    
    if (!data || data.length === 0) {
      showResult("⚠️ لا توجد كورسات نشطة حالياً في النظام.", "error");
      return;
    }
    
    coursesList = data;
    var select = document.getElementById('courseSelect');
    select.innerHTML = '<option value="">-- اختر الكورس --</option>';
    
    data.forEach(function(c, index) {
      var opt = document.createElement('option');
      opt.value = index;
      opt.text = c.course + " (" + c.term + ")";
      select.appendChild(opt);
    });
    
    showResult("✅ تم تحميل " + data.length + " كورس بنجاح", "success");
  }

  function updateSessions() {
    var index = document.getElementById('courseSelect').value;
    var sessionSelect = document.getElementById('sessionSelect');
    sessionSelect.innerHTML = '<option value="">-- اختر المحاضرة --</option>';
    
    if (index === "" || !coursesList[index]) return;
    
    var course = coursesList[index];
    var maxSessions = course.sessionsCount || 12;
    
    for (var i = 1; i <= maxSessions; i++) {
      var opt = document.createElement('option');
      opt.value = i;
      opt.text = "المحاضرة " + i;
      sessionSelect.appendChild(opt);
    }
  }

  function setCourseAndSession() {
    var index = document.getElementById('courseSelect').value;
    var session = document.getElementById('sessionSelect').value;
    
    if (index === "") {
      showResult("⚠️ من فضلك اختر الكورس أولاً", "error");
      return;
    }
    
    if (session === "") {
      showResult("⚠️ من فضلك اختر المحاضرة", "error");
      return;
    }
    
    var course = coursesList[index];
    selectedCourse = course.course;
    selectedTerm = course.term;
    selectedSession = session;
    
    showResult("✅ تم تحديد: " + selectedCourse + " - محاضرة " + selectedSession, "success");
    
    if (html5QrCode) {
      html5QrCode.stop().then(function() {
        startScanner();
      }).catch(function() {
        startScanner();
      });
    } else {
      startScanner();
    }
  }

  function startScanner() {
    if (isScanning) return;
    
    var readerElement = document.getElementById('reader');
    readerElement.innerHTML = '';
    
    html5QrCode = new Html5Qrcode("reader");
    
    var config = {
      fps: 10,
      qrbox: { width: 250, height: 250 },
      aspectRatio: 1.0
    };
    
    html5QrCode.start(
      { facingMode: "environment" },
      config,
      onScanSuccess,
      onScanError
    ).then(function() {
      isScanning = true;
      showResult("📷 الكاميرا جاهزة. امسح QR Code الخاص بالخادم.", "info");
    }).catch(function(err) {
      showResult("❌ تعذر فتح الكاميرا: " + err, "error");
    });
  }

  // 2. إرسال بيانات الحضور للمتصفح عبر حقن السكريبت الآمن (JSONP) لتجنب حظر CORS تماماً
  function onScanSuccess(decodedText, decodedResult) {
    if (!isScanning) return;
    if (!selectedCourse || !selectedSession) {
      showResult("⚠️ من فضلك حدد الكورس والمحاضرة أولاً", "error");
      return;
    }
    
    html5QrCode.stop().then(function() {
      isScanning = false;
    });
    
    showResult("⏳ جاري تسجيل الحضور وفحص التأخير المسموح...", "info");
    
    var script = document.createElement('script');
    script.src = SCRIPT_URL + "?api=scanQR&decodedText=" + encodeURIComponent(decodedText) + 
                 "&course=" + encodeURIComponent(selectedCourse) + 
                 "&session=" + encodeURIComponent(selectedSession) + 
                 "&term=" + encodeURIComponent(selectedTerm) + 
                 "&callback=handleScanResponse";
    document.body.appendChild(script);
  }

  // استقبال نتيجة الحضور وعرضها للمستخدم
  function handleScanResponse(data) {
    if (data.success) {
      showResult(data.message, "success");
    } else {
      showResult(data.message, "error");
    }
    document.getElementById('scanAgainBtn').style.display = 'block';
  }

  function onScanError(error) {
    // تجاهل أخطاء الحركة العادية
  }

  function restartScanner() {
    document.getElementById('result').style.display = 'none';
    document.getElementById('result').className = '';
    document.getElementById('scanAgainBtn').style.display = 'none';
    startScanner();
  }

  function showResult(message, type) {
    var resultDiv = document.getElementById('result');
    resultDiv.innerHTML = message;
    resultDiv.className = type;
    resultDiv.style.display = 'block';
  }
</script>
</body>
</html>
