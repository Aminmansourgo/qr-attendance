<!DOCTYPE html>
<html dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل حضور الخدام</title>
  <script src="https://cdn.jsdelivr.net/npm/html5-qrcode/minified/html5-qrcode.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Cairo', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; text-align: center; }
    .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    .header { background: linear-gradient(135deg, #1a237e, #283593); color: white; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
    select { padding: 10px; border-radius: 8px; border: 1px solid #ccc; width: 100%; margin-bottom: 10px; box-sizing: border-box; }
    #reader { width: 100%; max-width: 400px; margin: 0 auto; border-radius: 10px; overflow: hidden; }
    #result { margin-top: 20px; padding: 15px; border-radius: 8px; display: none; font-weight: bold; }
    .success { background: #d4edda; color: #155724; }
    .error { background: #f8d7da; color: #721c24; }
    .info { background: #d1ecf1; color: #0c5460; }
    .btn { padding: 12px 30px; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; margin: 5px; width: 100%; box-sizing: border-box; }
    .btn-blue { background: #1a237e; color: white; font-weight: bold; }
  </style>
</head>
<body>

<div class="container">
  <div class="header"><h2>📷 تسجيل حضور الخدام</h2></div>
  <div style="background: #f8f9fa; padding: 15px; border-radius: 10px; margin-bottom: 15px;">
    <select id="courseSelect" onchange="updateSessions()"><option>-- جاري تحميل الكورسات... --</option></select>
    <select id="sessionSelect"><option>-- اختر المحاضرة --</option></select>
    <button onclick="setCourseAndSession()" class="btn btn-blue">تأكيد واختيار الكورس</button>
  </div>
  <div id="reader"></div>
  <div id="result"></div>
</div>

<script>
  // ضع رابط الـ Web App الثابت الخاص بك هنا:
  const SCRIPT_URL = "ضع_الرابط_هنا";

  var html5QrCode;
  
  window.onload = function() {
    var script = document.createElement('script');
    script.src = SCRIPT_URL + "?api=getCourses&callback=handleCourses";
    document.body.appendChild(script);
  };

  function handleCourses(courses) {
    var select = document.getElementById('courseSelect');
    select.innerHTML = '<option value="">-- اختر الكورس --</option>';
    courses.forEach(function(c) {
      var opt = document.createElement('option');
      opt.value = JSON.stringify({ course: c.course, term: c.term, max: c.sessionsCount });
      opt.text = c.course + " (تيرم " + c.term + ")";
      select.appendChild(opt);
    });
  }

  function updateSessions() {
    var d = document.getElementById('courseSelect').value;
    var s = document.getElementById('sessionSelect');
    s.innerHTML = '<option value="">-- اختر المحاضرة --</option>';
    if (!d) return;
    var max = parseInt(JSON.parse(d).max) || 12;
    for (var i = 1; i <= max; i++) s.innerHTML += `<option value="${i}">المحاضرة ${i}</option>`;
  }

  function setCourseAndSession() {
    var d = document.getElementById('courseSelect').value;
    var s = document.getElementById('sessionSelect').value;
    if (!d || !s) return;
    showResult("✅ الكاميرا جاهزة.", "success");
    startScanner(JSON.parse(d).course, s, JSON.parse(d).term);
  }

  function startScanner(c, s, t) {
    html5QrCode = new Html5Qrcode("reader");
    html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
      html5QrCode.stop();
      showResult("⏳ جاري تسجيل الحضور...", "info");
      var script = document.createElement('script');
      script.src = SCRIPT_URL + "?api=scanQR&decodedText=" + encodeURIComponent(text) + 
                   "&course=" + encodeURIComponent(c) + "&session=" + encodeURIComponent(s) + 
                   "&term=" + encodeURIComponent(t) + "&callback=showRes";
      document.body.appendChild(script);
    });
  }

  function showRes(res) { showResult(res.message, res.success ? "success" : "error"); }
  function showResult(msg, type) {
    var r = document.getElementById('result');
    r.innerHTML = msg; r.className = type; r.style.display = 'block';
  }
</script>
</body>
</html>
